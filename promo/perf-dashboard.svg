<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 498" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect x="0" y="0" width="820" height="498" fill="#ffffff"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#0a8a0a">math-painter 实测：又轻又快</text>
  <text x="24" y="56" font-size="12" fill="#80868b">headless Chrome 线上实测 · 绿色为本工具实测值 · 灰色为同类竞品最慢实测值（非平均）</text>
  <text x="24" y="119" font-size="13" fill="#202124">首屏可交互 FCP</text>
  <rect x="180" y="106" width="420" height="18" rx="9" fill="#eceff1"/>
  <rect x="180" y="106" width="23" height="18" rx="9" fill="#0a8a0a"/>
  <text x="618" y="119" font-size="13" font-weight="700" fill="#0a8a0a">328ms</text>
  <text x="600" y="101" text-anchor="end" font-size="10.5" fill="#9aa0a6">竞品最慢 6100ms</text>
  <text x="24" y="165" font-size="13" fill="#202124">首屏冷启动</text>
  <rect x="180" y="152" width="420" height="18" rx="9" fill="#eceff1"/>
  <rect x="180" y="152" width="6" height="18" rx="9" fill="#0a8a0a"/>
  <text x="618" y="165" font-size="13" font-weight="700" fill="#0a8a0a">281ms</text>
  <text x="600" y="147" text-anchor="end" font-size="10.5" fill="#9aa0a6">竞品最慢 20.4s</text>
  <text x="24" y="211" font-size="13" fill="#202124">首屏传输体积</text>
  <rect x="180" y="198" width="420" height="18" rx="9" fill="#eceff1"/>
  <rect x="180" y="198" width="4" height="18" rx="9" fill="#0a8a0a"/>
  <text x="618" y="211" font-size="13" font-weight="700" fill="#0a8a0a">20.6KB</text>
  <text x="600" y="193" text-anchor="end" font-size="10.5" fill="#9aa0a6">竞品最慢 2.9MB</text>
  <text x="24" y="257" font-size="13" fill="#202124">首屏网络请求</text>
  <rect x="180" y="244" width="420" height="18" rx="9" fill="#eceff1"/>
  <rect x="180" y="244" width="18" height="18" rx="9" fill="#0a8a0a"/>
  <text x="618" y="257" font-size="13" font-weight="700" fill="#0a8a0a">5个</text>
  <text x="600" y="239" text-anchor="end" font-size="10.5" fill="#9aa0a6">竞品最慢 119个</text>
  <text x="24" y="303" font-size="13" fill="#202124">运行时依赖</text>
  <rect x="180" y="290" width="420" height="18" rx="9" fill="#eceff1"/>
  <rect x="180" y="290" width="4" height="18" rx="9" fill="#0a8a0a"/>
  <text x="618" y="303" font-size="13" font-weight="700" fill="#0a8a0a">0个</text>
  <text x="600" y="285" text-anchor="end" font-size="10.5" fill="#9aa0a6">竞品最慢 ≈30(估算)</text>
  <text x="24" y="349" font-size="13" fill="#202124">基线内存</text>
  <rect x="180" y="336" width="420" height="18" rx="9" fill="#eceff1"/>
  <rect x="180" y="336" width="10" height="18" rx="9" fill="#0a8a0a"/>
  <text x="618" y="349" font-size="13" font-weight="700" fill="#0a8a0a">0.9MB</text>
  <text x="600" y="331" text-anchor="end" font-size="10.5" fill="#9aa0a6">竞品最慢 38MB</text>
  <text x="24" y="395" font-size="13" fill="#202124">打包体积(gzip)</text>
  <rect x="180" y="382" width="420" height="18" rx="9" fill="#eceff1"/>
  <rect x="180" y="382" width="4" height="18" rx="9" fill="#0a8a0a"/>
  <text x="618" y="395" font-size="13" font-weight="700" fill="#0a8a0a">19KB</text>
  <text x="600" y="377" text-anchor="end" font-size="10.5" fill="#9aa0a6">竞品最慢 2.9MB</text>
  <text x="24" y="444" font-size="10.5" fill="#9aa0a6">注：竞品数值为同次实测中的最慢者（真实，非估算），用作对照上界；运行时依赖为典型框架量级估算。</text>
  <text x="24" y="460" font-size="10.5" fill="#9aa0a6">math-painter 为线上 https://mp.doi.l.cd 实测（已含真实网络延迟），传输仅 20KB。</text>
</svg>